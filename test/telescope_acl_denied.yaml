# Test config for ACL module-hiding in mainwindow.py: gui has zero permitted methods on the
# telescope, so it should never appear in the sidebar/nav list at all.
# Run with: pyobs telescope_acl_denied.yaml
class: pyobs.modules.MultiModule

location:
  longitude: 9.944722
  latitude: 51.560583
  elevation: 201

modules:
  telescope:
    class: pyobs.modules.telescope.DummyAltAzTelescope
    name: telescope
    comm:
      class: pyobs.comm.local.LocalComm
      name: telescope
    acl:
      allow:
        gui: []

  gui:
    class: pyobs_gui.GUI
    name: gui
    comm:
      class: pyobs.comm.local.LocalComm
      name: gui