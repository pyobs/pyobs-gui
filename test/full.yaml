# Full test setup — all dummy modules at once
# Run with: pyobs test/full.yaml
class: pyobs.modules.MultiModule

location:
  longitude: 9.944722
  latitude: 51.560583
  elevation: 201

vfs: &vfs
  class: pyobs.vfs.VirtualFileSystem
  roots:
    cache:
      class: pyobs.vfs.LocalFile
      root: /tmp/pyobs-test/
    webcam:
      class: pyobs.vfs.HttpFile
      download: http://localhost:37077/

modules:
  camera:
    class: pyobs.modules.camera.DummyCamera
    name: camera
    telescope: telescope
    vfs: *vfs
    comm:
      class: pyobs.comm.local.LocalComm
      name: camera

  telescope:
    class: pyobs.modules.telescope.DummyTelescope
    name: telescope
    comm:
      class: pyobs.comm.local.LocalComm
      name: telescope

  roof:
    class: pyobs.modules.roof.DummyRoof
    name: roof
    comm:
      class: pyobs.comm.local.LocalComm
      name: roof

  mode:
    class: pyobs.modules.utils.dummymode.DummyMode
    name: mode
    comm:
      class: pyobs.comm.local.LocalComm
      name: mode

  video:
    class: pyobs.modules.camera.dummyvideo.DummyVideo
    name: video
    port: 37077
    vfs: *vfs
    comm:
      class: pyobs.comm.local.LocalComm
      name: video

  autofocus:
    class: pyobs.modules.focus.DummyAutoFocus
    name: autofocus
    comm:
      class: pyobs.comm.local.LocalComm
      name: autofocus

  gui:
    class: pyobs_gui.GUI
    name: gui
    vfs: *vfs
    comm:
      class: pyobs.comm.local.LocalComm
      name: gui